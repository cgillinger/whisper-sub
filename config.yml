# emby-whisper configuration
# Mount this file read-only at /app/config.yml inside the container.

# Directories to scan (container paths as mapped in docker-compose.yml).
#
# Phase 6 — per-path settings:
#   min_confidence    — minimum detection confidence to treat audio as Swedish;
#                       below threshold default_language is used if set.
#   vad_filter        — Voice Activity Detection: skip silence, reduce
#                       hallucinations (recommended for home videos).
#   min_silence_duration — seconds of silence that VAD treats as a break (default 0.5).
#   default_language  — language code assumed when confidence < min_confidence.
#
# Legacy format (plain strings) is still accepted:
#   scan_paths:
#     - /media/Emby
scan_paths:
  - path: /media/Emby
    min_confidence: 0.7
    vad_filter: true
  - path: /media/EgenFilm1
    min_confidence: 0.5      # lower threshold for home videos
    vad_filter: true
    min_silence_duration: 0.5
    default_language: sv     # assume Swedish when Whisper is unsure

# Whisper settings
#
# KB-Whisper (Phase 4): set swedish_model to use a specialised model for
# Swedish transcription. When swedish_model differs from default_model the
# scan command uses a memory-efficient two-pass strategy:
#   Pass 1 — detect language for all files      (default_model)
#   Pass 2a — transcribe Swedish files           (swedish_model / KB-Whisper)
#   Pass 2b — translate non-Swedish files        (default_model, reloaded)
# Only one large model is in memory at a time (~3–4 GB each).
#
# To disable KB-Whisper, remove swedish_model or set it equal to default_model.
default_model: large-v3
swedish_model: KBLab/kb-whisper-large

# OpenVINO (Phase 5): uses the Intel iGPU (UHD 730) for 2-4x faster
# transcription.  Requires /dev/dri/renderD128 passed through in
# docker-compose.yml.  Falls back to CPU automatically if OpenVINO fails
# for a specific model (e.g. KB-Whisper on first run).
# Set to "cpu" to disable OpenVINO acceleration.
device: openvino
compute_type: int8

# Language logic
# Minimum detection confidence to treat audio as Swedish.
# Below this threshold the file is translated to English instead.
swedish_threshold: 0.7
default_task: translate    # action when language is not Swedish: translate to English

# Video file extensions to include
video_extensions:
  - .mp4
  - .mkv
  - .avi
  - .m4v
  - .mov
  - .wmv
  - .ts

# Behaviour
skip_if_subtitle_exists: true
max_files_per_run: 0       # 0 = unlimited

# Translation (optional)
# Translates the generated .en.srt subtitle to another language using an
# external LLM API.  Runs after each successful transcription in scan mode,
# and is also available as a standalone subcommand:
#   python whisper_sub.py translate /media/Movies --provider gemini-lite --lang sv
#
# provider references a file in translate/providers/<provider>.yml
# Providers: gemini-lite (free), gemini, openai, deepseek, anthropic
# target_language: ISO 639-1 code (sv, en, fr, de, es, …) or full language name
#
# Set GEMINI_API_KEY (or the relevant env var) before enabling.
translation:
  enabled: false
  provider: gemini-lite         # free tier: 20 req/day (reduced by Google 2025)
  target_language: sv           # translate .en.srt → .sv.srt

# Thermal throttling
# The container reads temperatures from bind-mounted sysfs paths:
#   CPU:  /sys/class/thermal/thermal_zone*  (zone type: x86_pkg_temp / coretemp)
#   NVMe: /sys/class/hwmon/hwmon*           (hwmon name contains "nvme")
# Values in sysfs are millidegrees Celsius (e.g. 72000 = 72 °C).
thermal:
  enabled: true
  cpu_pause_temp: 72       # pause queue when CPU  >= this °C
  nvme_pause_temp: 70      # pause queue when NVMe >= this °C
  resume_temp: 65          # resume when BOTH sensors drop below this °C
  check_interval: 30       # seconds between temperature checks during transcription
  max_pause_minutes: 30    # abort current file if paused longer than this
